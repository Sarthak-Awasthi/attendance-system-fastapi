<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Attendance</title>
  <script src="/static/scripts/theme.js"></script>
  <link rel="stylesheet" href="/static/styles/main.css" />
</head>
<body>
  <main class="page">
    <div class="page-header">
      <button class="button button-secondary theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode"></button>
    </div>
    <h1>Attendance Form</h1>
    <p class="subtitle">Enter your roll number to mark attendance for this live session.</p>
    <div class="card">
      <div class="status" id="devModeBadge"></div>
      <label class="label" for="roll">Roll Number</label>
      <input class="input" id="roll" type="text" placeholder="e.g. 21CS1001" maxlength="15" />
      <label class="label" for="rememberRoll">
        <input id="rememberRoll" type="checkbox" />
        Remember roll number on this device
      </label>
      <div class="button-row">
        <button class="button button-secondary" id="quickSubmitBtn" type="button" style="display: none;"></button>
        <button class="button button-secondary" id="clearSavedRollBtn" type="button" style="display: none;">Clear saved roll</button>
      </div>
      <label class="label" for="devMode">
        <input id="devMode" type="checkbox" />
        Dev mode (allow repeat submits from same device)
      </label>
      <button class="button button-primary" id="submitBtn">Submit Attendance</button>
      <div class="status status-error" id="msg"></div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const sessionId = params.get('session');
    const msg = document.getElementById('msg');
    const devModeBadge = document.getElementById('devModeBadge');
    const devModeToggle = document.getElementById('devMode');
    const rollInput = document.getElementById('roll');
    const rememberRollToggle = document.getElementById('rememberRoll');
    const quickSubmitBtn = document.getElementById('quickSubmitBtn');
    const clearSavedRollBtn = document.getElementById('clearSavedRollBtn');
    const ROLL_STORAGE_KEY = 'attendance-roll-number';

    if (!token || !sessionId) {
      msg.textContent = 'Invalid QR link.';
    }

    function normalizeRoll(value) {
      return String(value || '').trim().toUpperCase();
    }

    function isValidRoll(value) {
      return /^[A-Z0-9]{4,15}$/.test(value);
    }

    function getSavedRoll() {
      const saved = normalizeRoll(window.localStorage.getItem(ROLL_STORAGE_KEY));
      return isValidRoll(saved) ? saved : '';
    }

    function renderSavedRollActions() {
      const saved = getSavedRoll();
      const hasSaved = Boolean(saved);
      quickSubmitBtn.style.display = hasSaved ? 'inline-block' : 'none';
      clearSavedRollBtn.style.display = hasSaved ? 'inline-block' : 'none';
      quickSubmitBtn.textContent = hasSaved ? `One-touch submit as ${saved}` : '';
      rememberRollToggle.checked = hasSaved;
    }

    async function submitAttendance(rollNumber) {
      const devMode = devModeToggle.checked && !devModeToggle.disabled;
      const res = await fetch('/api/student/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rollNumber, token, sessionId, devMode })
      });

      if (res.ok) {
        window.location.href = '/static/student/result.html?ok=1';
        return;
      }

      let detail = 'Submission failed';
      try {
        const err = await res.json();
        detail = err.detail || detail;
      } catch (_) {
        detail = 'Submission failed';
      }
      window.location.href = `/static/student/result.html?ok=0&msg=${encodeURIComponent(detail)}`;
    }

    const restoredRoll = getSavedRoll();
    if (restoredRoll) {
      rollInput.value = restoredRoll;
      msg.className = 'status status-success';
      msg.textContent = `Saved roll loaded: ${restoredRoll}`;
    }
    renderSavedRollActions();

    async function loadDevModeAvailability() {
      const res = await fetch(`/api/student/session/${encodeURIComponent(sessionId)}/mode`);
      if (!res.ok) {
        devModeToggle.checked = false;
        devModeToggle.disabled = true;
        devModeBadge.className = 'status';
        devModeBadge.textContent = 'Dev mode status unavailable.';
        return;
      }

      const data = await res.json();
      const available = Boolean(data.effectiveDevModeAvailable);
      devModeToggle.checked = false;
      devModeToggle.disabled = !available;
      devModeBadge.className = `status ${available ? 'status-error' : ''}`;
      devModeBadge.textContent = available
        ? 'Dev mode active: repeat submissions are allowed for testing.'
        : 'Dev mode off: this device can submit once for this session.';
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
      msg.textContent = '';
      const rollNumber = normalizeRoll(rollInput.value);
      if (!isValidRoll(rollNumber)) {
        msg.className = 'status status-error';
        msg.textContent = 'Enter a valid roll number (4-15 letters/numbers).';
        return;
      }

      if (rememberRollToggle.checked) {
        window.localStorage.setItem(ROLL_STORAGE_KEY, rollNumber);
      } else {
        window.localStorage.removeItem(ROLL_STORAGE_KEY);
      }
      renderSavedRollActions();
      await submitAttendance(rollNumber);
    });

    quickSubmitBtn.addEventListener('click', async () => {
      const saved = getSavedRoll();
      if (!saved) {
        msg.className = 'status status-error';
        msg.textContent = 'No saved roll found. Submit once with remember enabled.';
        return;
      }
      rollInput.value = saved;
      await submitAttendance(saved);
    });

    clearSavedRollBtn.addEventListener('click', () => {
      window.localStorage.removeItem(ROLL_STORAGE_KEY);
      rememberRollToggle.checked = false;
      renderSavedRollActions();
      msg.className = 'status';
      msg.textContent = 'Saved roll cleared for this device.';
    });

    loadDevModeAvailability().catch(() => {
      devModeToggle.checked = false;
      devModeToggle.disabled = true;
      devModeBadge.className = 'status';
      devModeBadge.textContent = 'Dev mode status unavailable.';
    });
  </script>
</body>
</html>
