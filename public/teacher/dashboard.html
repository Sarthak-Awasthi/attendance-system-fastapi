<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard</title>
  <script src="/static/scripts/theme.js"></script>
  <link rel="stylesheet" href="/static/styles/main.css" />
</head>
<body>
  <main class="page">
    <div class="page-header">
      <button class="button button-secondary theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode"></button>
    </div>
    <h1>Live Attendance Dashboard</h1>
    <p class="subtitle">Track submissions in real time and end the session when complete.</p>
    <div class="card">
      <img class="qr" id="qr" alt="Live QR code" />

      <div class="metric">
        <div class="metric-label">Classroom code</div>
        <div class="metric-value" id="classroomCode">-</div>
      </div>

      <div class="metric">
        <div class="metric-label">Time remaining (seconds)</div>
        <div class="metric-value" id="remaining">-</div>
      </div>

      <div class="metric">
        <div class="metric-label">Submissions</div>
        <div class="metric-value" id="count">0</div>
      </div>

      <div class="button-row">
        <button class="button button-secondary" id="endBtn">End Session</button>
      </div>
      <p class="mt-16"><a class="link" href="/teacher">Back to setup</a></p>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session');
    const secret = params.get('secret');

    const qrImg = document.getElementById('qr');
    const remainingEl = document.getElementById('remaining');
    const countEl = document.getElementById('count');
    const classroomCodeEl = document.getElementById('classroomCode');

    if (!sessionId || !secret) {
      alert('Missing session details.');
      window.location.href = '/teacher';
    }

    async function pollQR() {
      const res = await fetch(`/api/teacher/session/${sessionId}/qr?secret=${encodeURIComponent(secret)}`);
      if (!res.ok) {
        return;
      }
      const data = await res.json();
      qrImg.src = data.qrBase64;
      remainingEl.textContent = data.timeRemainingSeconds;
      countEl.textContent = data.submissionCount;
      classroomCodeEl.textContent = data.classroomCode;

      if (!data.isActive || data.timeRemainingSeconds <= 0) {
        clearInterval(timer);
        alert('Session has ended.');
      }
    }

    document.getElementById('endBtn').addEventListener('click', async () => {
      await fetch(`/api/teacher/session/${sessionId}/end`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret })
      });
      clearInterval(timer);
      alert('Session ended.');
      window.location.href = '/teacher';
    });

    pollQR();
    const timer = setInterval(pollQR, 2000);
  </script>
</body>
</html>
