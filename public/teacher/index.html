<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher - Attendance Setup</title>
  <script src="/static/scripts/theme.js"></script>
  <link rel="stylesheet" href="/static/styles/main.css" />
</head>
<body>
  <main class="page">
    <div class="page-header">
      <button class="button button-secondary theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode"></button>
    </div>
    <h1>Start Attendance Session</h1>
    <p class="subtitle">Create a timed session and share the generated QR with your class.</p>
    <p class="mt-16"><a class="link" href="/teacher/config">Open teacher configuration</a></p>
    <div class="card" id="bootstrapCard" style="display: none;">
      <p class="subtitle">First run detected. Set a teacher secret to secure the system.</p>
      <label class="label" for="bootstrapSecret">New Teacher Secret</label>
      <input class="input" id="bootstrapSecret" type="password" />

      <label class="label" for="bootstrapConfirm">Confirm Teacher Secret</label>
      <input class="input" id="bootstrapConfirm" type="password" />

      <button class="button button-primary" id="bootstrapBtn">Save Teacher Secret</button>
      <div class="status status-error" id="bootstrapError"></div>
    </div>

    <div class="card" id="sessionCard">
      <label class="label" for="course">Course</label>
      <select class="select" id="course"></select>

      <label class="label" for="duration">Duration (minutes)</label>
      <input class="input" id="duration" type="number" min="1" value="10" />

      <label class="label" for="secret">Teacher Secret</label>
      <input class="input" id="secret" type="password" />

      <button class="button button-primary" id="startBtn">Start Session</button>
      <div class="status status-error" id="error"></div>
    </div>
  </main>

  <script>
    const courseSelect = document.getElementById('course');
    const startBtn = document.getElementById('startBtn');
    const errorEl = document.getElementById('error');
    const bootstrapCard = document.getElementById('bootstrapCard');
    const sessionCard = document.getElementById('sessionCard');
    const bootstrapBtn = document.getElementById('bootstrapBtn');
    const bootstrapErrorEl = document.getElementById('bootstrapError');

    async function loadCourses() {
      courseSelect.innerHTML = '';
      const res = await fetch('/api/teacher/courses');
      const data = await res.json();
      const duration = Number(data.defaults?.durationMinutes || 10);
      document.getElementById('duration').value = String(duration);

      (data.courses || []).forEach((c) => {
        const option = document.createElement('option');
        option.value = c.code;
        option.textContent = `${c.code} - ${c.name || ''}`;
        courseSelect.appendChild(option);
      });

      if (courseSelect.options.length === 0) {
        errorEl.textContent = 'No courses configured. Open teacher configuration to add a course.';
      }
    }

    async function checkBootstrapStatus() {
      const res = await fetch('/api/teacher/bootstrap/status');
      if (!res.ok) {
        throw new Error('Failed to check bootstrap status');
      }
      const data = await res.json();
      return Boolean(data.requiresBootstrap);
    }

    function setBootstrapMode(enabled) {
      bootstrapCard.style.display = enabled ? 'block' : 'none';
      sessionCard.style.display = enabled ? 'none' : 'block';
    }

    bootstrapBtn.addEventListener('click', async () => {
      bootstrapErrorEl.textContent = '';
      const newSecret = document.getElementById('bootstrapSecret').value;
      const confirmNewSecret = document.getElementById('bootstrapConfirm').value;

      const res = await fetch('/api/teacher/bootstrap', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ newSecret, confirmNewSecret })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        bootstrapErrorEl.textContent = err.detail || 'Failed to save teacher secret';
        return;
      }

      document.getElementById('secret').value = newSecret;
      setBootstrapMode(false);
      await loadCourses();
    });

    startBtn.addEventListener('click', async () => {
      errorEl.textContent = '';
      const payload = {
        courseCode: courseSelect.value,
        durationMinutes: Number(document.getElementById('duration').value || 10),
        secret: document.getElementById('secret').value
      };

      const res = await fetch('/api/teacher/session/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const err = await res.json();
        errorEl.textContent = err.detail || 'Failed to start session';
        return;
      }

      const data = await res.json();
      const query = new URLSearchParams({ session: data.sessionId, secret: payload.secret });
      window.location.href = `/teacher/dashboard?${query.toString()}`;
    });

    (async () => {
      try {
        const needsBootstrap = await checkBootstrapStatus();
        setBootstrapMode(needsBootstrap);
        if (!needsBootstrap) {
          await loadCourses();
        }
      } catch (_) {
        errorEl.textContent = 'Failed to initialize teacher setup.';
      }
    })();
  </script>
</body>
</html>
